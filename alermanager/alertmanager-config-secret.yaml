# secret-alertmanager-config.yaml
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-prometheus-kube-prometheus-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: ""

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "slack-notifications"
      routes:
        - match:
            severity: critical
          receiver: "slack-critical"
        - match:
            severity: warning
          receiver: "slack-warnings"

    receivers:
      - name: "slack-notifications"
        slack_configs:
          - channel: "#alerts-channel"
            send_resolved: true

      - name: "slack-critical"
        slack_configs:
          - channel: "#alerts-channel"
            send_resolved: true
            icon_emoji: ":fire:"
            username: "Prometheus Alertmanager"
            title: "[CRITICAL] {{ .GroupLabels.alertname }}"
            text: |
              *Alert:* {{ .GroupLabels.alertname }}
              *Severity:* `{{ .CommonLabels.severity }}`
              *Namespace:* {{ .CommonLabels.namespace }}
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: "slack-warnings"
        slack_configs:
          - channel: "#alerts-channel"
            send_resolved: true
            icon_emoji: ":warning:"
            username: "Prometheus Alertmanager"
            title: "[WARNING] {{ .GroupLabels.alertname }}"
            text: |
              *Alert:* {{ .GroupLabels.alertname }}
              {{ range .Alerts }}
              *Summary:* {{ .Annotations.summary }}
              {{ end }}

    inhibit_rules:
      - source_match:
          severity: "critical"
        target_match:
          severity: "warning"
        equal: ["alertname", "namespace"]